<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist ASM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F6FA;
    --surface: #FFFFFF;
    --surface2: #F8F9FC;
    --border: #E2E8F2;
    --border-mid: #D0D9EC;
    --text: #1A2740;
    --text-mid: #4A5E7A;
    --text-muted: #8A9BB5;
    --green: #059669;
    --green-bg: #ECFDF5;
    --green-border: #A7F3D0;
    --blue: #2563EB;
    --blue-bg: #EFF6FF;
    --accent: #F59E0B;
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-card: 0 2px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner { max-width: 760px; margin: auto; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #059669, #10B981);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(5,150,105,.3);
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 19px; font-weight: 800; color: var(--text);
    letter-spacing: -.3px;
  }
  .header h1 span { color: var(--green); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  /* ── SELECTS ── */
  .selects-row {
    display: grid;
    grid-template-columns: 1fr 1fr 140px;
    gap: 10px;
  }
  @media(max-width:560px) {
    .selects-row { grid-template-columns: 1fr 1fr; }
    .selects-row .date-wrap { grid-column: 1 / -1; }
  }
  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 10px; font-weight: 600; letter-spacing: .7px;
    text-transform: uppercase; color: var(--text-muted);
  }
  select, input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border-mid);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
    appearance: none; -webkit-appearance: none;
    cursor: pointer; outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  select:focus, input[type="date"]:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(5,150,105,.12);
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    max-width: 760px; margin: 16px auto 0; padding: 0 20px;
  }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-meta strong { color: var(--green); font-variant-numeric: tabular-nums; }
  .progress-track {
    height: 5px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #059669, #10B981);
    border-radius: 99px; transition: width .4s ease; width: 0%;
  }

  /* ── MAIN ── */
  .main { max-width: 760px; margin: auto; padding: 20px 16px 130px; }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
    transition: border-color .2s;
  }
  .section-card.open { border-color: var(--border-mid); }

  .section-header {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 11px;
    cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .section-header:hover { background: var(--surface2); }

  .section-pill {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .section-title {
    flex: 1;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text);
  }
  .section-badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px;
    background: var(--bg); color: var(--text-muted); border: 1px solid var(--border);
    transition: all .2s; white-space: nowrap;
  }
  .section-badge.all-done { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .section-chevron { color: var(--text-muted); font-size: 11px; transition: transform .25s; }
  .section-card.open .section-chevron { transform: rotate(180deg); }

  .section-body {
    display: none; padding: 6px 14px 14px; border-top: 1px solid var(--border);
  }
  .section-card.open .section-body { display: block; }

  /* ── CHECK ITEM ── */
  .check-item { margin-top: 10px; }

  .check-row {
    display: flex; align-items: flex-start; gap: 0;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; transition: border-color .2s;
  }
  .check-row.checked { border-color: var(--green-border); background: var(--green-bg); }

  .check-trigger {
    flex-shrink: 0; width: 48px; display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 14px 0; border-right: 1px solid var(--border);
    transition: background .15s;
    background: var(--surface2);
  }
  .check-row.checked .check-trigger { background: var(--green-bg); border-color: var(--green-border); }
  .check-trigger:hover { background: var(--bg); }

  .check-box {
    width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
    border: 2px solid var(--border-mid); background: white;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s; position: relative;
  }
  .check-row.checked .check-box { background: var(--green); border-color: var(--green); }
  .check-box::after {
    content: '';
    width: 5px; height: 9px;
    border-right: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0; transition: opacity .12s;
  }
  .check-row.checked .check-box::after { opacity: 1; }

  input[type="checkbox"] { display: none; }

  .check-content { flex: 1; padding: 10px 12px; }

  .check-title {
    font-size: 13.5px; font-weight: 500; color: var(--text); line-height: 1.4;
    margin-bottom: 2px;
  }
  .check-row.checked .check-title { color: var(--text-muted); text-decoration: line-through; }

  /* ── INFO TOGGLE ── */
  .info-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--blue); cursor: pointer;
    margin-top: 4px; user-select: none;
    font-weight: 500; transition: opacity .15s;
  }
  .info-toggle:hover { opacity: .7; }
  .info-toggle .arrow { transition: transform .2s; display: inline-block; }
  .info-toggle.open .arrow { transform: rotate(90deg); }

  .info-box {
    display: none; margin-top: 8px;
    background: var(--blue-bg); border-left: 3px solid var(--blue);
    border-radius: 0 6px 6px 0; padding: 10px 12px;
    font-size: 12.5px; color: var(--text-mid); line-height: 1.55;
  }

  .notes-area {
    margin-top: 8px;
  }
  .notes-label {
    font-size: 10px; font-weight: 600; letter-spacing: .6px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;
    display: block;
  }
  textarea.notes-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; line-height: 1.45;
    resize: vertical; min-height: 56px;
    outline: none; transition: border-color .18s, box-shadow .18s;
  }
  textarea.notes-input:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px rgba(5,150,105,.1);
  }
  textarea.notes-input::placeholder { color: var(--text-muted); }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 12px 16px; z-index: 200;
    box-shadow: 0 -4px 20px rgba(0,0,0,.07);
  }
  .bottom-inner { max-width: 760px; margin: auto; display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 13px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-save {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-mid);
  }
  .btn-save:hover { background: var(--bg); }
  .btn-export {
    background: var(--green); color: white;
    box-shadow: 0 2px 8px rgba(5,150,105,.3);
  }
  .btn-export:hover { background: #047857; transform: translateY(-1px); }
  .btn-clear {
    flex: 0 0 auto; width: 48px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-clear:hover { color: #DC2626; border-color: #FCA5A5; background: #FEF2F2; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%) translateY(-10px);
    background: var(--text); color: white;
    padding: 9px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all .25s ease; z-index: 999; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

// ── INIT SELECTS ──────────────────────────────────────────────────
const asmEl = document.getElementById("asm");
Object.keys(dealers).forEach(n => asmEl.appendChild(new Option(n, n)));
document.getElementById("fecha").value = new Date().toISOString().split("T")[0];

function onAsmChange() {
  const asm = asmEl.value;
  const sel = document.getElementById("concesionario");
  sel.innerHTML = "<option value=''>Seleccionar…</option>";
  if (asm && dealers[asm]) dealers[asm].forEach(c => sel.appendChild(new Option(c, c)));
}

// ── BUILD UI ──────────────────────────────────────────────────────
const root = document.getElementById("root");

sections.forEach(sec => {
  const card = document.createElement("div");
  card.className = "section-card";
  card.id = `card-${sec.id}`;

  const itemsHTML = sec.items.map((item, i) => `
    <div class="check-item">
      <div class="check-row" id="row-${sec.id}-${i}">
        <div class="check-trigger" onclick="toggleCheck('${sec.id}',${i})">
          <div class="check-box"></div>
          <input type="checkbox" id="chk-${sec.id}-${i}">
        </div>
        <div class="check-content">
          <div class="check-title">${item.title}</div>
          <div class="info-toggle" id="toggle-${sec.id}-${i}" onclick="toggleInfo('${sec.id}',${i})">
            <span class="arrow">▶</span> ¿Qué revisar?
          </div>
          <div class="info-box" id="info-${sec.id}-${i}">${item.info}</div>
          <div class="notes-area">
            <span class="notes-label">Notas</span>
            <textarea class="notes-input" id="notes-${sec.id}-${i}" placeholder="Añade tus observaciones…" oninput="saveState()"></textarea>
          </div>
        </div>
      </div>
    </div>
  `).join("");

  card.innerHTML = `
    <div class="section-header" onclick="toggleSection('${sec.id}')">
      <div class="section-pill" style="background:${sec.bg};color:${sec.color}">${sec.icon}</div>
      <span class="section-title">${sec.title}</span>
      <span class="section-badge" id="badge-${sec.id}">0 / ${sec.items.length}</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body" id="body-${sec.id}">${itemsHTML}</div>
  `;
  root.appendChild(card);
});

// ── TOGGLE SECTION ────────────────────────────────────────────────
function toggleSection(id) {
  document.getElementById(`card-${id}`).classList.toggle("open");
}

// ── TOGGLE CHECK ──────────────────────────────────────────────────
function toggleCheck(secId, idx) {
  const chk = document.getElementById(`chk-${secId}-${idx}`);
  const row = document.getElementById(`row-${secId}-${idx}`);
  chk.checked = !chk.checked;
  row.classList.toggle("checked", chk.checked);
  updateProgress();
  saveState();
}

// ── TOGGLE INFO ───────────────────────────────────────────────────
function toggleInfo(secId, idx) {
  const box = document.getElementById(`info-${secId}-${idx}`);
  const tog = document.getElementById(`toggle-${secId}-${idx}`);
  const isOpen = box.style.display === "block";
  box.style.display = isOpen ? "none" : "block";
  tog.classList.toggle("open", !isOpen);
}

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  let total = 0, done = 0;
  sections.forEach(sec => {
    let sd = 0;
    sec.items.forEach((_, i) => {
      if (document.getElementById(`chk-${sec.id}-${i}`)?.checked) { done++; sd++; }
    });
    total += sec.items.length;
    const b = document.getElementById(`badge-${sec.id}`);
    if (b) { b.textContent = `${sd} / ${sec.items.length}`; b.classList.toggle("all-done", sd === sec.items.length); }
  });
  document.getElementById("prog-count").textContent = `${done} / ${total}`;
  document.getElementById("prog-fill").style.width = total ? `${(done/total)*100}%` : "0%";
}

// ── SAVE / LOAD ───────────────────────────────────────────────────
const KEY = "asm_checklist_v3";

function saveState() {
  const state = {
    asm: document.getElementById("asm").value,
    concesionario: document.getElementById("concesionario").value,
    fecha: document.getElementById("fecha").value,
    items: {}
  };
  sections.forEach(sec => sec.items.forEach((_, i) => {
    state.items[`${sec.id}|${i}`] = {
      checked: document.getElementById(`chk-${sec.id}-${i}`)?.checked || false,
      notes: document.getElementById(`notes-${sec.id}-${i}`)?.value || ""
    };
  }));
  localStorage.setItem(KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(KEY);
  if (!raw) return;
  try {
    const s = JSON.parse(raw);
    document.getElementById("asm").value = s.asm || "";
    onAsmChange();
    setTimeout(() => { document.getElementById("concesionario").value = s.concesionario || ""; }, 10);
    document.getElementById("fecha").value = s.fecha || new Date().toISOString().split("T")[0];
    Object.entries(s.items || {}).forEach(([key, val]) => {
      const [secId, idx] = key.split("|");
      const chk = document.getElementById(`chk-${secId}-${idx}`);
      const row = document.getElementById(`row-${secId}-${idx}`);
      const notes = document.getElementById(`notes-${secId}-${idx}`);
      if (chk) chk.checked = val.checked;
      if (row) row.classList.toggle("checked", val.checked);
      if (notes) notes.value = val.notes || "";
    });
    updateProgress();
  } catch(e) {}
}

function save() { saveState(); showToast("✅ Guardado correctamente"); }

function clearAll() {
  if (!confirm("¿Limpiar todos los datos?")) return;
  localStorage.removeItem(KEY); location.reload();
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────
function exportExcel() {
  const asm = document.getElementById("asm").value || "—";
  const conc = document.getElementById("concesionario").value || "—";
  const fecha = document.getElementById("fecha").value || "—";

  const rows = [["ASM","Concesionario","Fecha","Sección","Punto de revisión","Estado","Notas"]];
  sections.forEach(sec => sec.items.forEach((item, i) => {
    rows.push([
      asm, conc, fecha, sec.title, item.title,
      document.getElementById(`chk-${sec.id}-${i}`)?.checked ? "✓ Revisado" : "Pendiente",
      document.getElementById(`notes-${sec.id}-${i}`)?.value || ""
    ]);
  }));

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:18},{wch:28},{wch:11},{wch:30},{wch:58},{wch:13},{wch:42}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Checklist ASM");
  const safeName = conc.replace(/[^\w\s]/g,"").substring(0,20).trim();
  XLSX.writeFile(wb, `Checklist_${safeName}_${fecha}.xlsx`);
  showToast("📊 Excel exportado");
}

// ── TOAST ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadState();
updateProgress();
