<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist ASM</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

h1 {
  text-align: center;
  padding: 15px;
  background: #0078D4;
  color: white;
}

.section {
  background: white;
  margin: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.section-header {
  padding: 15px;
  background: #e6f0fa;
  cursor: pointer;
  font-weight: bold;
}

.section-content {
  display: none;
  padding: 10px 15px;
}

label {
  display: flex;
  align-items: center;
  margin: 8px 0;
}

input[type="checkbox"] {
  margin-right: 10px;
}

textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 5px;
}

.buttons {
  position: sticky;
  bottom: 0;
  background: white;
  padding: 10px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  font-size: 14px;
  border: none;
  border-radius: 8px;
}

.save { background: #28a745; color: white; }
.export { background: #0078D4; color: white; }
</style>
</head>

<body>

<h1>Checklist ASM</h1>

<div id="app"></div>

<div class="buttons">

</div>
