<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist ASM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C48C;
    --green-dark: #009E72;
    --navy: #0A1628;
    --navy-mid: #142340;
    --navy-light: #1E3356;
    --slate: #2D4A6E;
    --accent: #FFB800;
    --text: #E8EEF6;
    --text-muted: #8DA4C0;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--slate) 100%);
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner { max-width: 720px; margin: auto; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--green); }

  /* ── SELECTS ROW ── */
  .selects-row {
    display: grid;
    grid-template-columns: 1fr 1fr 140px;
    gap: 10px;
  }
  @media(max-width:560px) {
    .selects-row { grid-template-columns: 1fr 1fr; }
    .selects-row .date-wrap { grid-column: 1 / -1; }
  }

  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-muted);
  }

  select, input[type="date"] {
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  select:focus, input[type="date"]:focus { border-color: var(--green); }
  select option { background: var(--navy-mid); }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    max-width: 720px; margin: 16px auto 0; padding: 0 20px;
  }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-meta strong { color: var(--green); font-variant-numeric: tabular-nums; }
  .progress-track {
    height: 6px; background: var(--navy-light); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), #00E0A4);
    border-radius: 99px; transition: width .4s ease;
    width: 0%;
  }

  /* ── MAIN ── */
  .main { max-width: 720px; margin: auto; padding: 20px 16px 120px; }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .section-card.open { border-color: rgba(0,196,140,0.2); }

  .section-header {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: background .2s;
  }
  .section-header:hover { background: var(--card-hover); }

  .section-icon {
    width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .section-title {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
  }

  .section-badge {
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 99px;
    background: var(--navy-light); color: var(--text-muted);
    transition: all .2s;
  }
  .section-badge.done { background: rgba(0,196,140,0.15); color: var(--green); }

  .section-chevron {
    color: var(--text-muted); font-size: 12px;
    transition: transform .3s ease;
  }
  .section-card.open .section-chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 4px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .section-card.open .section-body { display: block; }

  /* ── CHECKLIST ITEM ── */
  .check-item {
    margin-top: 12px;
  }
  .check-label {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px;
    background: var(--navy-light);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .2s;
  }
  .check-label:hover { border-color: var(--border); background: rgba(255,255,255,0.06); }
  .check-label.checked {
    background: rgba(0,196,140,0.08);
    border-color: rgba(0,196,140,0.25);
  }

  .check-box {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid var(--slate);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    position: relative;
  }
  .check-label.checked .check-box {
    background: var(--green); border-color: var(--green);
  }
  .check-box::after {
    content: '';
    width: 6px; height: 10px;
    border-right: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0; transition: opacity .15s;
  }
  .check-label.checked .check-box::after { opacity: 1; }

  input[type="checkbox"] { display: none; }

  .check-text {
    font-size: 14px; line-height: 1.45; color: var(--text);
    flex: 1;
  }
  .check-label.checked .check-text { color: var(--text-muted); text-decoration: line-through; }

  .notes-input {
    width: 100%; margin-top: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; line-height: 1.5;
    resize: vertical; min-height: 60px;
    outline: none; transition: border-color .2s;
  }
  .notes-input:focus { border-color: rgba(0,196,140,0.4); }
  .notes-input::placeholder { color: var(--text-muted); }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,22,40,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    z-index: 200;
  }
  .bottom-inner {
    max-width: 720px; margin: auto;
    display: flex; gap: 10px;
  }
  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-save {
    background: var(--navy-light);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-save:hover { background: var(--slate); }
  .btn-export {
    background: var(--green);
    color: #fff;
  }
  .btn-export:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-clear {
    flex: 0 0 auto; width: 50px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 14px;
  }
  .btn-clear:hover { color: #ff6b6b; border-color: #ff6b6b; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--green); color: white;
    padding: 10px 22px; border-radius: 99px;
    font-size: 14px; font-weight: 600;
    opacity: 0; transition: all .3s ease;
    z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">🌾</div>
      <div>
        <h1>Checklist <span>ASM</span></h1>
      </div>
    </div>
    <div class="selects-row">
      <div class="field-wrap">
        <span class="field-label">ASM</span>
        <select id="asm" onchange="onAsmChange()">
          <option value="">Seleccionar ASM...</option>
        </select>
      </div>
      <div class="field-wrap">
        <span class="field-label">Concesionario</span>
        <select id="concesionario">
          <option value="">Seleccionar concesionario...</option>
        </select>
      </div>
      <div class="field-wrap date-wrap">
        <span class="field-label">Fecha</span>
        <input type="date" id="fecha">
      </div>
    </div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span>Progreso de la visita</span>
    <strong id="progress-count">0 / 0</strong>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="main" id="checklist-root"></div>

<div class="bottom-bar">
  <div class="bottom-inner">
    <button class="btn btn-save" onclick="save()">💾 Guardar</button>
    <button class="btn btn-export" onclick="exportExcel()">📊 Exportar Excel</button>
    <button class="btn btn-clear" title="Limpiar formulario" onclick="clearAll()">🗑</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

// ── DATA ──────────────────────────────────────────────────────────────
const concesionariosData = {
  "José Pérez": ["Garaje Dulantzi S.L.","Maxideza S.L.","Sapesa","V. Sancho S.A."],
  "Augusto Vicente": ["Arlanza servicios generales S.L.","Basilio Peral S.L.","Maquinaria Agrícola segovia Noroeste S.L.","Maquinaria Agrícola Sial S.L.","Portugal"],
  "Mariano González": ["Agrícola del Jalón S.A.","Auto Agrisa, S.L.","Cuisine S.A.","Rufino Ojer S.L.","Sora Agroindustrial S.L.","Talleres Casares S.L.","Tractors Pelach 17 S.L.U."],
  "Federico Amigo": ["Agrocampo Albacete S.L.","Algein S.A.","Geancar Maquinaria S.A.","Grimasy Motor S.L.","Librado Maquinaria S.A."],
  "Juan Manuel Ruiz": ["Agrícola Miguel Valero S.L.","Agrimaquinaria chico S.L.","Alonso Maquinaria Don Benito S.L.","Carretero Maquinaria Agrícola S.A.","Masur Agrícola S.L."]
};

const sections = [
  { id: "vision", icon: "🌍", color: "#3B82F6", title: "Visión Global", items: [
    "Situación general del concesionario: ventas + taller",
    "Situación de mercado",
    "NPS (Net Promotor Score): revisión de cómo nos ve el cliente"
  ]},
  { id: "stock", icon: "📦", color: "#F59E0B", title: "Stock", items: [
    "Stock total y por segmentos de potencia y maquinaria",
    "Clasificación por antigüedad",
    "Unidades retenidas",
    "Plan de salida para stock general y unidades críticas (>90 días)"
  ]},
  { id: "pedidos", icon: "📝", color: "#8B5CF6", title: "Pedidos Pendientes", items: [
    "Pedidos vendidos y no vendidos",
    "Fechas de llegada y programación de venta",
    "Pedidos pendientes",
    "Plan de preventa para unidades no vendidas"
  ]},
  { id: "mercado", icon: "📊", color: "#06B6D4", title: "Análisis de Mercado Local", items: [
    "Problemas / tendencias detectadas en la zona / situación del agro",
    "Matriculaciones",
    "Cuota de mercado",
    "Identificación de segmentos prioritarios",
    "Cobertura de ventas total y por vendedor",
    "Conversión total y por vendedor",
    "Análisis por segmentos de potencia"
  ]},
  { id: "competencia", icon: "🏁", color: "#EF4444", title: "Análisis de la Competencia", items: [
    "Análisis competencia (John Deere >340CV): ¿Dónde? ¿Hemos estado? Modelos que crecen anormalmente",
    "Actividad de la competencia (campañas en marcha: precio, financiación…)"
  ]},
  { id: "financiero", icon: "💳", color: "#10B981", title: "Situación Financiera – Póliza de Crédito", items: [
    "Capacidad de crédito / nivel de utilización",
    "Unidades On Hold",
    "Plan de pagos previstos"
  ]},
  { id: "oportunidades", icon: "🔥", color: "#F97316", title: "Oportunidades Comerciales", items: [
    "Objetivo de oportunidades",
    "Oportunidades ganadas y perdidas y contra quién",
    "Oportunidades activas ahora y estado de las operaciones",
    "Identificación oportunidades por segmento de potencia",
    "Oportunidades calientes (cierre <30 días)",
    "Priorización de visitas a clientes con alta probabilidad de cierre",
    "Actualización P20"
  ]},
  { id: "campanas", icon: "📢", color: "#EC4899", title: "Circulares y Campañas", items: [
    "Circulares revisadas y dudas aclaradas",
    "Actualización del estado de las campañas activas y en preparación",
    "Acciones especiales"
  ]},
  { id: "objetivos", icon: "🎯", color: "#6366F1", title: "Objetivos y Business Plan", items: [
    "Objetivo anual",
    "Situación actual",
    "Acciones previstas",
    "Prioridades comerciales",
    "Cálculo del Bonus"
  ]},
  { id: "planes", icon: "♟️", color: "#14B8A6", title: "Planes de Acción (Full Line)", items: [
    "Top 5 grandes cuentas: estado de cada cuenta",
    "Estrategias diferenciales / marketing para los KA",
    "Oportunidades de cosechadora",
    "Oportunidades eléctricos",
    "Seguimiento de reclamaciones"
  ]},
  { id: "actividad", icon: "🚜", color: "#84CC16", title: "Actividad Comercial", items: [
    "Demos realizadas",
    "Plan de demostraciones",
    "Visitas con vendedores: a clientes KA, oportunidades calientes y clientes que no han comprado en 5 años",
    "Operaciones acompañadas",
    "Plan de visitas conjuntas ASM + comercial"
  ]},
  { id: "marketing", icon: "📣", color: "#F43F5E", title: "Marketing y Acciones", items: [
    "Eventos, ferias previstas, acciones de marketing locales e impacto esperado",
    "Acciones especiales",
    "Revisión de objetivos BSA y reporte de resultados",
    "NPS: revisión de cómo nos ve el cliente"
  ]},
  { id: "formacion", icon: "🎓", color: "#A855F7", title: "Formación del Equipo", items: [
    "Necesidades detectadas",
    "Formaciones planificadas y propuestas"
  ]},
  { id: "cierre", icon: "✅", color: "#00C48C", title: "Cierre de Visita", items: [
    "Resumen de acuerdos",
    "Acciones definidas",
    "Responsables",
    "Plazos",
    "Plan de seguimiento para la próxima visita"
  ]}
];

// ── INIT ──────────────────────────────────────────────────────────────
const asmSelect = document.getElementById("asm");
Object.keys(concesionariosData).forEach(name => {
  asmSelect.appendChild(new Option(name, name));
});

document.getElementById("fecha").value = new Date().toISOString().split("T")[0];

function onAsmChange() {
  const asm = asmSelect.value;
  const sel = document.getElementById("concesionario");
  sel.innerHTML = "<option value=''>Seleccionar concesionario...</option>";
  if (asm && concesionariosData[asm]) {
    concesionariosData[asm].forEach(c => sel.appendChild(new Option(c, c)));
  }
}

// ── BUILD UI ──────────────────────────────────────────────────────────
const root = document.getElementById("checklist-root");

sections.forEach(sec => {
  const card = document.createElement("div");
  card.className = "section-card";
  card.id = `card-${sec.id}`;

  const totalItems = sec.items.length;

  card.innerHTML = `
    <div class="section-header" onclick="toggleSection('${sec.id}')">
      <div class="section-icon" style="background:${sec.color}22; color:${sec.color}">${sec.icon}</div>
      <span class="section-title">${sec.title}</span>
      <span class="section-badge" id="badge-${sec.id}">0 / ${totalItems}</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body" id="body-${sec.id}">
      ${sec.items.map((item, i) => `
        <div class="check-item">
          <label class="check-label" id="label-${sec.id}-${i}" onclick="toggleCheck('${sec.id}',${i})">
            <div class="check-box"></div>
            <input type="checkbox" id="chk-${sec.id}-${i}">
            <span class="check-text">${item}</span>
          </label>
          <textarea class="notes-input" id="notes-${sec.id}-${i}" placeholder="Notas…" oninput="saveState()"></textarea>
        </div>
      `).join("")}
    </div>
  `;
  root.appendChild(card);
});

function toggleSection(id) {
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle("open");
}

function toggleCheck(secId, idx) {
  const chk = document.getElementById(`chk-${secId}-${idx}`);
  const lbl = document.getElementById(`label-${secId}-${idx}`);
  chk.checked = !chk.checked;
  lbl.classList.toggle("checked", chk.checked);
  updateProgress();
  saveState();
}

// ── PROGRESS ──────────────────────────────────────────────────────────
function updateProgress() {
  let total = 0, done = 0;
  sections.forEach(sec => {
    const n = sec.items.length;
    total += n;
    let secDone = 0;
    sec.items.forEach((_, i) => {
      const chk = document.getElementById(`chk-${sec.id}-${i}`);
      if (chk && chk.checked) { done++; secDone++; }
    });
    const badge = document.getElementById(`badge-${sec.id}`);
    if (badge) {
      badge.textContent = `${secDone} / ${n}`;
      badge.classList.toggle("done", secDone === n);
    }
  });
  document.getElementById("progress-count").textContent = `${done} / ${total}`;
  document.getElementById("progress-fill").style.width = total ? `${(done/total)*100}%` : "0%";
}

// ── SAVE / LOAD ───────────────────────────────────────────────────────
function getStorageKey() { return "asm_checklist_v2"; }

function saveState() {
  const state = {
    asm: document.getElementById("asm").value,
    concesionario: document.getElementById("concesionario").value,
    fecha: document.getElementById("fecha").value,
    items: {}
  };
  sections.forEach(sec => {
    sec.items.forEach((_, i) => {
      const chk = document.getElementById(`chk-${sec.id}-${i}`);
      const notes = document.getElementById(`notes-${sec.id}-${i}`);
      state.items[`${sec.id}-${i}`] = { checked: chk.checked, notes: notes.value };
    });
  });
  localStorage.setItem(getStorageKey(), JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(getStorageKey());
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    document.getElementById("asm").value = state.asm || "";
    onAsmChange();
    document.getElementById("concesionario").value = state.concesionario || "";
    document.getElementById("fecha").value = state.fecha || new Date().toISOString().split("T")[0];
    if (state.items) {
      Object.entries(state.items).forEach(([key, val]) => {
        const [secId, idx] = key.split(/-(?=\d+$)/);
        const chk = document.getElementById(`chk-${secId}-${idx}`);
        const lbl = document.getElementById(`label-${secId}-${idx}`);
        const notes = document.getElementById(`notes-${secId}-${idx}`);
        if (chk) { chk.checked = val.checked; }
        if (lbl) { lbl.classList.toggle("checked", val.checked); }
        if (notes) { notes.value = val.notes || ""; }
      });
    }
    updateProgress();
  } catch(e) { /* ignore */ }
}

function save() {
  saveState();
  showToast("✅ Guardado correctamente");
}

function clearAll() {
  if (!confirm("¿Limpiar todos los datos del formulario?")) return;
  localStorage.removeItem(getStorageKey());
  location.reload();
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────────
function exportExcel() {
  const asm = document.getElementById("asm").value || "—";
  const conc = document.getElementById("concesionario").value || "—";
  const fecha = document.getElementById("fecha").value || "—";

  const rows = [["ASM", "Concesionario", "Fecha", "Sección", "Punto", "Estado", "Notas"]];

  sections.forEach(sec => {
    sec.items.forEach((item, i) => {
      const chk = document.getElementById(`chk-${sec.id}-${i}`);
      const notes = document.getElementById(`notes-${sec.id}-${i}`);
      rows.push([
        asm, conc, fecha,
        sec.title, item,
        chk && chk.checked ? "✓ Revisado" : "Pendiente",
        notes ? notes.value : ""
      ]);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws["!cols"] = [
    { wch: 18 }, { wch: 30 }, { wch: 12 },
    { wch: 30 }, { wch: 55 }, { wch: 14 }, { wch: 40 }
  ];

  // Header styling
  const headerStyle = {
    font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 },
    fill: { patternType: "solid", fgColor: { rgb: "0A3D62" } },
    alignment: { vertical: "center", wrapText: true }
  };
  ["A1","B1","C1","D1","E1","F1","G1"].forEach(cell => {
    if (ws[cell]) ws[cell].s = headerStyle;
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Checklist ASM");

  const safeConc = conc.replace(/[^a-zA-Z0-9\s]/g, "").substring(0, 20).trim();
  XLSX.writeFile(wb, `Checklist_${safeConc}_${fecha}.xlsx`);
  showToast("📊 Excel exportado");
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── START ─────────────────────────────────────────────────────────────
loadState();
updateProgress();

</script>
