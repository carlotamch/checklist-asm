<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist ASM</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f2f2f2;
}

h1 {
  text-align: center;
}

.section {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.section h2 {
  background: #0078D4;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 16px;
}

label {
  display: block;
  margin: 8px 0;
}

textarea {
  width: 100%;
  margin-top: 5px;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 5px;
}

.save {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Checklist ASM</h1>

<div id="app"></div>

<button class="save" onclick="save()">Guardar ✅</button>

<script>

const data = {

"Visión Global": [
"Situación general del concesionario",
"NPS (Net Promoter Score)"
],

"Stock": [
"Stock total y por segmentos",
"Clasificación por antigüedad",
"Plan salida stock (>90 días)"
],

"Pedidos pendientes": [
"Pedidos vendidos y no vendidos",
"Fechas llegada y ventas",
"Pedidos pendientes",
"Plan preventa no vendidas"
],

"Mercado local": [
"Problemas y tendencias agro",
"Matriculaciones",
"Cuota de mercado",
"Segmentos prioritarios",
"Cobertura ventas",
"Conversión ventas",
"Análisis por potencia"
],

"Competencia": [
"Análisis competencia >340CV",
"Actividad competencia"
],

"Finanzas": [
"Nivel utilización crédito",
"Unidades On Hold",
"Plan pagos"
],

"Oportunidades": [
"Objetivo oportunidades",
"Ganadas / perdidas",
"Oportunidades activas",
"Oportunidades por potencia",
"Oportunidades calientes",
"Priorización clientes",
"Actualización P20"
],

"Campañas": [
"Circulares revisadas",
"Dudas aclaradas",
"Estado campañas",
"Acciones especiales"
],

"Objetivos y Plan": [
"Objetivo anual",
"Situación actual",
"Acciones previstas",
"Prioridades",
"Bonus"
],

"Planes acción": [
"Top 5 cuentas",
"Estado cuentas",
"Estrategia KA",
"Oportunidades cosechadora",
"Oportunidades eléctricos",
"Reclamaciones"
],

"Actividad Comercial": [
"Demos",
"Plan demos",
"Visitas clientes",
"Operaciones",
"Plan visitas ASM"
],

"Marketing": [
"Eventos y ferias",
"Acciones marketing",
"Objetivos BSA"
],

"Formación": [
"Necesidades",
"Formaciones"
],

"Cierre": [
"Resumen acuerdos",
"Acciones",
"Responsables",
"Plazos",
"Seguimiento"
]

};


// CREAR UI
const app = document.getElementById("app");

Object.keys(data).forEach(section => {

  const div = document.createElement("div");
  div.className = "section";

  let html = `<h2>${section}</h2>`;

  data[section].forEach(item => {
    const id = section + item;

    html += `
      <label>
        <input type="checkbox" id="${id}">
        ${item}
      </label>
      <textarea id="txt_${id}" placeholder="Notas..."></textarea>
    `;
  });

  div.innerHTML = html;
  app.appendChild(div);
});


// GUARDAR
function save() {
  document.querySelectorAll("input, textarea").forEach(el => {
    localStorage.setItem(el.id, el.type === "checkbox" ? el.checked : el.value);
  });
  alert("Guardado ✅");
}


// CARGAR
window.onload = function () {
  document.querySelectorAll("input, textarea").forEach(el => {
    const val = localStorage.getItem(el.id);
    if (el.type === "checkbox") el.checked = val === "true";
    else el.value = val || "";
  });
};

</script>

</body>
</html>
